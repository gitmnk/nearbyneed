<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NearbyNeed | Real-time Resources for SF & Oakland</title>
    <meta name="description" content="A trusted, zero-money platform for finding homeless resources (food & shelter) in SF and Oakland.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <i data-lucide="map-pin"></i>
                <span class="logo-text">NearbyNeed</span>
            </div>
            <div id="location-badge" class="location-badge">Detecting Location...</div>
        </div>
    </header>

    <main>
        <section class="banner">
            <div class="container">
                <p><strong>$0 Transaction Platform</strong>: Everything here is free. <a href="#">Report</a> if anyone asks for money.</p>
            </div>
        </section>

        <section class="filters container">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="food">Food</button>
                <button class="filter-btn" data-filter="shelter">Shelter</button>
                <button class="filter-btn" data-filter="water">Water</button>
            </div>
        </section>
        </section>

        <section class="resources container">
            <div id="resource-container" class="resource-list">
                <!-- Loading state -->
                <div class="loading-state">Finding resources near you...</div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 NearbyNeed. SF/Oakland Community Pilot.</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
