<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NearbyNeed | Real-time Resources for SF & Oakland</title>
    <meta name="description" content="A trusted, zero-money platform for finding homeless resources (food & shelter) in SF and Oakland.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <i data-lucide="map-pin"></i>
                <span class="logo-text">NearbyNeed</span>
            </div>
            <div id="location-badge" class="location-badge">Detecting Location...</div>
        </div>
    </header>

    <main>
        <section class="banner">
            <div class="container">
                <p><strong>$0 Transaction Platform</strong>: Everything here is free. <a href="#">Report</a> if anyone asks for money.</p>
            </div>
        </section>

        <section class="filters container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="food">Food</button>
                <button class="filter-btn" data-filter="shelter">Shelter</button>
                <button class="filter-btn" data-filter="water">Water</button>
            </div>
            
            <div class="view-toggle">
                <button id="btn-list-view" class="filter-btn active"><i data-lucide="list"></i> List View</button>
                <button id="btn-map-view" class="filter-btn"><i data-lucide="map"></i> Map View</button>
            </div>
        </section>
        </section>

        <section class="resources container">
            <div id="resource-container" class="resource-list">
                <!-- Loading state -->
                <div class="loading-state">Finding resources near you...</div>
            </div>
            
            <!-- Map Container (Hidden by default) -->
            <div id="map-container" class="map-container" style="display: none; height: 600px; width: 100%; border-radius: 12px; margin-top: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 NearbyNeed. SF/Oakland Community Pilot.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
